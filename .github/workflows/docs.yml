name: Docs

on:
  push:
    branches:
      - devel
      - fix/docs

jobs:
  deploy:
    permissions:
      pages: write # To deploy to Pages
      id-token: write # Verify deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Setup nim"
        uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: devel

      - run: nimble --useSystemNim dump --json
      - name: "Build documentation"
        uses: ire4ever1190/nim-docs-action@fix/nim-download-prompt
        with:
          main-file: "src/nort.nim"
          # deploy: "pages"
          versions: "stable HEAD"
